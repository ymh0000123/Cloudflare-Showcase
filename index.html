<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudflare Analytics</title>
    <script src="https://lf6-cdnjs.zstaticcdn.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://lf6-cdnjs.zstaticcdn.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root {
        --primary: #B8860B;
        --primary-light: #DAA520;
        --primary-dark: #996515;
        --danger: #dc3545;
        --success: #28a745;
        --warning: #B8860B;
        --bg: #e8e8e8;
        --bg-card: #ffffff;
        --bg-card-hover: #f5f5f5;
        --text: #1a1a1a;
        --text-secondary: #666666;
        --border: #d0d0d0;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.15);
        --radius: 0px;
        --accent-yellow: #B8860B;
      }

      [data-theme="light"] {
        --primary: #B8860B;
        --primary-light: #DAA520;
        --primary-dark: #996515;
        --bg: #e8e8e8;
        --bg-card: #ffffff;
        --bg-card-hover: #f5f5f5;
        --text: #1a1a1a;
        --text-secondary: #666666;
        --border: #d0d0d0;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.15);
      }

      [data-theme="dark"] {
        --primary: #FFD700;
        --primary-light: #FFE44D;
        --primary-dark: #E5C100;
        --bg: #0a0a0a;
        --bg-card: #141414;
        --bg-card-hover: #1a1a1a;
        --text: #ffffff;
        --text-secondary: #777777;
        --border: #2a2a2a;
        --shadow: 0 0 20px rgba(255, 215, 0, 0.05);
        --shadow-hover: 0 0 30px rgba(255, 215, 0, 0.15);
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --primary: #FFD700;
          --primary-light: #FFE44D;
          --primary-dark: #E5C100;
          --bg: #0a0a0a;
          --bg-card: #141414;
          --bg-card-hover: #1a1a1a;
          --text: #ffffff;
          --text-secondary: #777777;
          --border: #2a2a2a;
          --shadow: 0 0 20px rgba(255, 215, 0, 0.05);
          --shadow-hover: 0 0 30px rgba(255, 215, 0, 0.15);
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* 左侧垂直黄色装饰线 */
      body::before {
        content: '';
        position: fixed;
        left: 0;
        top: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(180deg, var(--accent-yellow) 0%, var(--accent-yellow) 50%, transparent 100%);
        z-index: 1000;
      }

      @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) body::before {
          background: linear-gradient(180deg, #B8860B 0%, #B8860B 50%, transparent 100%);
        }
      }

      /* 加载进度条 */
      .loading-progress {
        position: fixed;
        left: 0;
        top: 0;
        width: 4px;
        height: 0%;
        background: var(--accent-yellow);
        z-index: 1001;
        transition: height 0.3s ease;
        box-shadow: 0 0 10px var(--accent-yellow);
        animation: pulse 1.5s ease-in-out infinite;
        display: none;
      }

      .loading-progress.active {
        display: block;
      }

      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 10px var(--accent-yellow); }
        50% { box-shadow: 0 0 20px var(--accent-yellow), 0 0 30px var(--accent-yellow); }
      }

      .loading-percent {
        position: absolute;
        right: -50px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent-yellow);
        font-size: 14px;
        font-weight: 700;
        font-family: 'Inter', monospace;
        text-shadow: 0 0 10px var(--accent-yellow);
        white-space: nowrap;
      }

      .loading-progress::after {
        content: '';
        position: absolute;
        right: -20px;
        top: 50%;
        transform: translateY(-50%);
        width: 12px;
        height: 12px;
        background: var(--accent-yellow);
        border-radius: 50%;
        box-shadow: 0 0 15px var(--accent-yellow);
        opacity: 0.8;
        animation: dotPulse 1s ease-in-out infinite;
      }

      @keyframes dotPulse {
        0%, 100% { transform: translateY(-50%) scale(1); opacity: 0.8; }
        50% { transform: translateY(-50%) scale(1.2); opacity: 1; }
      }

      .loading-progress.complete {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        animation: none;
        display: none;
      }

      .loading-progress.complete::after,
      .loading-progress.complete .loading-percent {
        opacity: 0;
        visibility: hidden;
        animation: none;
      }

      @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) {
          --accent-yellow: #B8860B;
        }
      }

      /* 卡片入场动画 */
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes glowPulse {
        0%, 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.2); }
        50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
      }

      .header {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        padding: 16px 24px 16px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(10px);
      }

      .header-title {
        font-size: 18px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .header-title i {
        color: var(--accent-yellow);
        font-size: 20px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-icon {
        width: 36px;
        height: 36px;
        border-radius: 0;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .btn-icon:hover {
        background: var(--accent-yellow);
        color: #ffffff;
        border-color: var(--accent-yellow);
        box-shadow: 0 0 15px rgba(184, 134, 11, 0.3);
      }

      .btn-icon.loading {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px 24px 24px 28px;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }

      @media (max-width: 1024px) {
        .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      }

      @media (max-width: 640px) {
        .kpi-grid { grid-template-columns: 1fr; }
      }

      .kpi-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px 20px;
        position: relative;
        overflow: hidden;
        transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        animation: slideInLeft 0.6s ease forwards;
        opacity: 0;
        cursor: pointer;
      }

      .kpi-card:nth-child(1) { animation-delay: 0.1s; }
      .kpi-card:nth-child(2) { animation-delay: 0.2s; }
      .kpi-card:nth-child(3) { animation-delay: 0.3s; }
      .kpi-card:nth-child(4) { animation-delay: 0.4s; }

      .kpi-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        width: 3px;
        height: 100%;
        background: var(--accent-yellow);
        transform: scaleY(0);
        transition: transform 0.3s ease;
      }

      .kpi-card:hover::before {
        transform: scaleY(1);
      }

      .kpi-card:hover {
        background: var(--bg-card-hover);
      }

      .kpi-label {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .kpi-label i {
        font-size: 14px;
        color: var(--accent-yellow);
      }

      .kpi-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--text);
        font-family: 'Inter', monospace;
      }

      .charts-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      @media (max-width: 900px) {
        .charts-grid { grid-template-columns: 1fr; }
        .chart-container { height: 280px; }
      }

      .chart-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        position: relative;
        transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        animation: fadeIn 0.8s ease forwards;
        opacity: 0;
        cursor: pointer;
      }

      .chart-card:nth-child(1) { animation-delay: 0.5s; }
      .chart-card:nth-child(2) { animation-delay: 0.6s; }
      .chart-card:nth-child(3) { animation-delay: 0.7s; }
      .chart-card:nth-child(4) { animation-delay: 0.8s; }
      .chart-card:nth-child(5) { animation-delay: 0.9s; }

      .chart-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, var(--accent-yellow) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .chart-card:hover::before {
        opacity: 1;
      }

      .chart-card:hover {
        background: var(--bg-card-hover);
      }

      .chart-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }

      .chart-title {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text);
      }

      .chart-toggle {
        display: inline-flex;
        background: var(--bg);
        border-radius: 0;
        padding: 2px;
        border: 1px solid var(--border);
      }

      .chart-toggle-btn {
        padding: 6px 10px;
        border: none;
        background: transparent;
        border-radius: 0;
        cursor: pointer;
        color: var(--text-secondary);
        font-size: 13px;
        transition: all 0.3s ease;
      }

      .chart-toggle-btn:hover {
        color: var(--accent-yellow);
      }

      .chart-toggle-btn.active {
        background: var(--accent-yellow);
        color: #ffffff;
      }

      .chart-container {
        width: 100%;
        height: 320px;
      }

      .watermark {
        position: fixed;
        bottom: 16px;
        left: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 0;
        padding: 12px 16px;
        font-size: 11px;
        color: var(--text-secondary);
        z-index: 50;
        backdrop-filter: blur(10px);
      }

      .watermark-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .watermark-time {
        font-weight: 600;
        color: var(--accent-yellow);
        font-family: 'Inter', monospace;
      }

      .watermark-info {
        margin-top: 4px;
        font-size: 10px;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .footer {
        text-align: center;
        padding: 32px 24px;
        color: var(--text-secondary);
        font-size: 12px;
        border-top: 1px solid var(--border);
        margin-top: 32px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .footer a {
        color: var(--accent-yellow);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .footer a:hover {
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      }

      /* Mobile Responsive */
      @media (max-width: 640px) {
        .header {
          padding: 12px 16px 12px 20px;
        }
        .header-title {
          font-size: 14px;
          letter-spacing: 1px;
        }
        .container {
          padding: 16px 16px 16px 20px;
        }
        .kpi-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 12px;
        }
        .kpi-card {
          padding: 16px 12px;
        }
        .kpi-label {
          font-size: 10px;
        }
        .kpi-value {
          font-size: 22px;
        }
        .charts-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .chart-card {
          padding: 16px;
        }
        .chart-title {
          font-size: 12px;
        }
        .chart-container {
          height: 240px;
        }
        .chart-card > div:last-child {
          max-height: 240px;
        }
        .watermark {
          bottom: 8px;
          left: 8px;
          right: auto;
          padding: 10px 12px;
          font-size: 10px;
          max-width: 160px;
        }
        .footer {
          padding: 20px 16px;
          font-size: 11px;
        }
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 2px solid var(--border);
        border-top-color: var(--accent-yellow);
        border-radius: 0;
        animation: spin 1s linear infinite;
        margin: 40px auto;
      }

      .progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        z-index: 200;
        display: none;
        background: var(--border);
      }

      .progress-bar-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--accent-yellow), var(--accent-yellow));
        transition: width 0.3s;
        box-shadow: 0 0 10px var(--accent-yellow);
      }
    </style>
    <script>
      let currentUserAgentData = [];
      let currentChartType = 'bar';

      const botData = [
        { name: 'GoogleBot', operator: 'Google', category: '搜索引擎爬虫', userAgent: 'Googlebot/', percentage: '12.96%' },
        { name: 'Claude-User', operator: 'Anthropic', category: 'AI 助手', userAgent: 'Claude-User', percentage: '8.95%' },
        { name: 'Meta-ExternalAgent', operator: 'Meta', category: 'AI 爬虫', userAgent: 'meta-externalagent', percentage: '6.97%' },
        { name: 'GPTBot', operator: 'OpenAI', category: 'AI 爬虫', userAgent: 'GPTBot', percentage: '5.73%' },
        { name: 'BingBot', operator: 'Microsoft', category: '搜索引擎爬虫', userAgent: 'bingbot/', percentage: '4.93%' },
        { name: 'Google AdsBot', operator: 'Google', category: '广告营销', userAgent: 'AdsBot-Google', percentage: '3.85%' },
        { name: 'FacebookExternalHit', operator: 'Meta', category: '社交媒体', userAgent: 'facebookexternalhit/', percentage: '3.53%' },
        { name: 'Applebot', operator: 'Apple', category: 'AI 搜索', userAgent: 'Applebot', percentage: '3.44%' },
        { name: 'Amazonbot', operator: 'Amazon', category: 'AI 爬虫', userAgent: 'Amazonbot', percentage: '3.24%' },
        { name: 'Claude-SearchBot', operator: 'Anthropic', category: 'AI 搜索', userAgent: 'Claude-SearchBot', percentage: '-' },
        { name: 'ChatGPT-User', operator: 'OpenAI', category: 'AI 助手', userAgent: 'ChatGPT-User', percentage: '-' },
        { name: 'GoogleOther', operator: 'Google', category: 'AI 爬虫', userAgent: 'GoogleOther', percentage: '-' },
        { name: 'Google-Agent', operator: 'Google', category: 'AI 助手', userAgent: 'Google-Agent', percentage: '-' },
        { name: 'Amazon AdBot', operator: 'Amazon', category: '广告营销', userAgent: 'AmazonAdBot', percentage: '-' },
        { name: 'Amazon Kendra', operator: 'Amazon', category: 'AI 爬虫', userAgent: 'amazon-kendra-', percentage: '-' },
        { name: 'Bing Preview', operator: 'Microsoft', category: '页面预览', userAgent: 'BingPreview', percentage: '-' },
        { name: 'AhrefsBot', operator: 'Ahrefs', category: 'SEO 工具', userAgent: 'AhrefsBot', percentage: '-' },
      ];

      function populateBotTable() {
        const tbody = document.getElementById('bot-table-body');
        if (!tbody) return;
        tbody.innerHTML = botData.map(bot => `
          <tr style="border-bottom: 1px solid var(--border);">
            <td style="padding: 10px 8px; font-weight: 500;">${bot.name}</td>
            <td style="padding: 10px 8px;">${bot.operator}</td>
            <td style="padding: 10px 8px;"><span style="background: var(--bg); padding: 2px 8px; border-radius: 4px; font-size: 11px;">${bot.category}</span></td>
            <td style="padding: 10px 8px; font-family: monospace; font-size: 12px; color: var(--primary);">${bot.userAgent}</td>
            <td style="padding: 10px 8px; font-weight: 600;">${bot.percentage}</td>
          </tr>
        `).join('');
      }

      function getThemeColors() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
          (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
        return {
          text: isDark ? '#ffffff' : '#1a1a1a',
          textSecondary: isDark ? '#777777' : '#666666',
          border: isDark ? '#2a2a2a' : '#e0e0e0',
          bg: isDark ? '#141414' : '#ffffff',
          splitLine: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)',
        };
      }

      function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeIcon(next);
        if (window.chartData) createCharts(window.chartData);
      }

      function updateThemeIcon(theme) {
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      }

      function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
          updateThemeIcon(saved);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
          updateThemeIcon('dark');
        }
      }

      function formatTimestamp(ts) {
        const d = new Date(ts * 1000);
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      }

      function formatTraffic(mb, p = 2) {
        if (mb >= 1024 * 1024) return (mb / (1024 * 1024)).toFixed(p) + ' TB';
        if (mb >= 1024) return (mb / 1024).toFixed(p) + ' GB';
        return mb.toFixed(p) + ' MB';
      }

      function formatRequests(count, p = 1) {
        if (count >= 1e8) return (count / 1e8).toFixed(p) + 'BN';
        if (count >= 1e4) return (count / 1e4).toFixed(p) + 'W';
        if (count >= 1e3) return (count / 1e3).toFixed(p) + 'K';
        return Math.round(count).toLocaleString();
      }

      function animateValue(id, start, end, dur, fmt) {
        const el = document.getElementById(id);
        if (!el) return;
        let t0 = null;
        const step = (ts) => {
          if (!t0) t0 = ts;
          const p = Math.min((ts - t0) / dur, 1);
          el.textContent = fmt(p * (end - start) + start);
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }

      function createKPIs(data) {
        const totalReq = data.reduce((s, d) => s + d.total_requests, 0);
        const totalTraffic = data.reduce((s, d) => s + d.total_megabytes, 0);
        const totalWaf = data.reduce((s, d) => s + d.waf_mitigated_requests, 0);
        const wafRate = totalReq > 0 ? (totalWaf / totalReq) * 100 : 0;

        animateValue('kpi-requests', 0, totalReq, 1200, v => formatRequests(v));
        animateValue('kpi-traffic', 0, totalTraffic, 1200, v => formatTraffic(v));
        animateValue('kpi-waf', 0, totalWaf, 1200, v => formatRequests(v));
        animateValue('kpi-rate', 0, wafRate, 1200, v => v.toFixed(1) + '%');
      }

      function createCharts(data) {
        const labels = data.map(d => formatTimestamp(d.since));
        const requests = data.map(d => d.total_requests);
        const traffic = data.map(d => d.total_megabytes);
        const waf = data.map(d => d.waf_mitigated_requests);
        const c = getThemeColors();

        ['requestsWafChart', 'trafficChart', 'userAgentChart', 'countryChart'].forEach(id => {
          const el = document.getElementById(id);
          if (el && el.__ecInstance__) el.__ecInstance__.dispose();
        });

        const rwChart = echarts.init(document.getElementById('requestsWafChart'));
        const tChart = echarts.init(document.getElementById('trafficChart'));
        const uaChart = echarts.init(document.getElementById('userAgentChart'));
        const coChart = echarts.init(document.getElementById('countryChart'));

        window.__charts = [rwChart, tChart, uaChart, coChart];

        const tooltipBase = {
          backgroundColor: c.bg,
          borderColor: c.border,
          textStyle: { color: c.text, fontSize: 12 },
          borderRadius: 8,
          padding: 10,
        };

        rwChart.setOption({
          tooltip: { ...tooltipBase, trigger: 'axis', formatter: params => {
            let s = params[0].name + '<br/>';
            params.forEach(p => s += p.seriesName + ': ' + formatRequests(p.value) + '<br/>');
            return s;
          }},
          legend: { data: ['总请求数', 'WAF拦截'], top: 0, textStyle: { color: c.textSecondary, fontSize: 12 } },
          grid: { left: 12, right: 12, bottom: 12, top: 40, containLabel: true },
          xAxis: { type: 'category', data: labels, axisLabel: { rotate: 45, fontSize: 10, color: c.textSecondary }, axisLine: { lineStyle: { color: c.border } }, boundaryGap: false },
          yAxis: { type: 'value', axisLabel: { formatter: v => formatRequests(v, 0), color: c.textSecondary }, splitLine: { lineStyle: { color: c.splitLine } } },
          series: [
            { name: '总请求数', type: 'line', data: requests, smooth: true, symbol: 'none', lineStyle: { width: 2, color: '#FFD700' }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(255, 215, 0, 0.4)' }, { offset: 1, color: 'rgba(255, 215, 0, 0.02)' }]) } },
            { name: 'WAF拦截', type: 'line', data: waf, smooth: true, symbol: 'none', lineStyle: { width: 2, color: '#FFA500' }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(255, 165, 0, 0.3)' }, { offset: 1, color: 'rgba(255, 165, 0, 0.02)' }]) } },
          ],
          animation: true,
          animationDuration: 1000,
        });

        tChart.setOption({
          tooltip: { ...tooltipBase, trigger: 'axis', formatter: params => params[0].name + '<br/>流量: ' + formatTraffic(params[0].value) },
          legend: { data: ['流量'], top: 0, textStyle: { color: c.textSecondary, fontSize: 12 } },
          grid: { left: 12, right: 12, bottom: 12, top: 40, containLabel: true },
          xAxis: { type: 'category', data: labels, axisLabel: { rotate: 45, fontSize: 10, color: c.textSecondary }, axisLine: { lineStyle: { color: c.border } }, boundaryGap: false },
          yAxis: { type: 'value', axisLabel: { formatter: v => formatTraffic(v, 1), color: c.textSecondary }, splitLine: { lineStyle: { color: c.splitLine } } },
          series: [
            { name: '流量', type: 'line', data: traffic, smooth: true, symbol: 'none', lineStyle: { width: 2, color: '#FFE44D' }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(255, 228, 77, 0.3)' }, { offset: 1, color: 'rgba(255, 228, 77, 0.02)' }]) } },
          ],
          animation: true,
          animationDuration: 1000,
        });

        createUserAgentChart(data, c);
        createCountryChart(data, c);

        window.addEventListener('resize', () => {
          if (window.__charts) window.__charts.forEach(ch => ch.resize());
        });
      }

      function createUserAgentChart(data, c) {
        const counts = {};
        data.forEach(d => {
          if (d.top_user_agents) d.top_user_agents.forEach(ua => {
            counts[ua.browser] = (counts[ua.browser] || 0) + ua.requests;
          });
        });
        const sorted = Object.entries(counts).map(([b, r]) => ({ browser: b, requests: r })).sort((a, b) => b.requests - a.requests);
        currentUserAgentData = sorted;
        renderUserAgentChart(sorted, c);
      }

      function renderUserAgentChart(data, c) {
        const chart = echarts.getInstanceByDom(document.getElementById('userAgentChart')) || echarts.init(document.getElementById('userAgentChart'));
        const colors = ['#FFD700', '#FFC107', '#FFB300', '#FFA000', '#FF8F00', '#FF6F00', '#FFE44D', '#FFD54F', '#FFCA28', '#FFC107'];

        if (currentChartType === 'pie') {
          chart.setOption({
            tooltip: { ...c, trigger: 'item', formatter: p => p.name + '<br/>请求数: ' + formatRequests(p.value) + '<br/>占比: ' + p.percent + '%' },
            series: [{
              type: 'pie', radius: ['40%', '70%'], center: ['40%', '50%'],
              label: { show: false },
              emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' } },
              data: data.map((d, i) => ({ name: d.browser, value: d.requests, itemStyle: { color: colors[i % colors.length] } })),
            }],
            animation: true, animationDuration: 800,
          }, true);
        } else {
          chart.setOption({
            tooltip: { ...c, trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: p => p[0].name + '<br/>请求数: ' + formatRequests(p[0].value) },
            grid: { left: 12, right: 40, bottom: 12, top: 8, containLabel: true },
            xAxis: { type: 'value', axisLabel: { formatter: v => formatRequests(v, 0), color: c.textSecondary }, splitLine: { lineStyle: { color: c.splitLine } } },
            yAxis: { type: 'category', data: data.map(d => d.browser), axisLabel: { color: c.textSecondary, fontSize: 11 }, inverse: true },
            series: [{
              type: 'bar', barWidth: 16,
              data: data.map((d, i) => ({ value: d.requests, itemStyle: { color: colors[i % colors.length], borderRadius: [0, 4, 4, 0] } })),
              label: { show: true, position: 'right', formatter: p => formatRequests(p.value), color: c.textSecondary, fontSize: 10 },
            }],
            animation: true, animationDuration: 800,
          }, true);
        }
      }

      function createCountryChart(data, c) {
        const isoMap = {
          'CN': 'China', 'US': 'United States', 'JP': 'Japan', 'KR': 'Korea', 'GB': 'United Kingdom',
          'FR': 'France', 'DE': 'Germany', 'CA': 'Canada', 'AU': 'Australia', 'IN': 'India',
          'BR': 'Brazil', 'NL': 'Netherlands', 'SG': 'Singapore', 'RU': 'Russia', 'IT': 'Italy',
          'ES': 'Spain', 'MX': 'Mexico', 'SE': 'Sweden', 'NO': 'Norway', 'FI': 'Finland',
          'DK': 'Denmark', 'CH': 'Switzerland', 'AT': 'Austria', 'BE': 'Belgium', 'PT': 'Portugal',
          'IE': 'Ireland', 'IL': 'Israel', 'TR': 'Turkey', 'PL': 'Poland', 'UA': 'Ukraine',
          'AR': 'Argentina', 'CO': 'Colombia', 'CL': 'Chile', 'PE': 'Peru', 'NZ': 'New Zealand',
          'TH': 'Thailand', 'MY': 'Malaysia', 'ID': 'Indonesia', 'PH': 'Philippines',
          'VN': 'Vietnam', 'AE': 'United Arab Emirates', 'SA': 'Saudi Arabia', 'ZA': 'South Africa',
          'TW': 'China', 'HK': 'China', 'MO': 'China',
        };

        const counts = {};
        data.forEach(d => {
          if (d.top_countries) d.top_countries.forEach(co => {
            let name = isoMap[co.country] || co.country;
            counts[name] = (counts[name] || 0) + co.requests;
          });
        });

        const mapData = Object.entries(counts).map(([n, v]) => ({ name: n, value: v })).sort((a, b) => b.value - a.value);
        const maxVal = mapData.length > 0 ? mapData[0].value : 100;

        const chart = echarts.getInstanceByDom(document.getElementById('countryChart')) || echarts.init(document.getElementById('countryChart'));
        chart.setOption({
          tooltip: { ...c, trigger: 'item', formatter: p => p.data && p.data.value ? p.name + '<br/>请求数: ' + formatRequests(p.data.value) : p.name + '<br/>无数据' },
          visualMap: { min: 0, max: maxVal, left: 'left', bottom: 10, text: ['高', '低'], calculable: true, inRange: { color: c.text === '#1a1a1a' ? ['#f5e6b8', '#B8860B', '#8B6914'] : ['#4a3800', '#FFD700', '#FFE44D'] }, textStyle: { color: c.textSecondary } },
          series: [{
            type: 'map', map: 'world', roam: true,
            emphasis: { label: { show: true, color: c.text }, itemStyle: { areaColor: c.border } },
            itemStyle: { areaColor: c.text === '#1a1a1a' ? '#e8e8e8' : '#2a2a2a', borderColor: c.border, borderWidth: 0.5 },
            data: mapData,
          }],
          animation: true, animationDuration: 800,
        }, true);
      }

      function toggleChartType(type) {
        if (type === currentChartType) return;
        currentChartType = type;
        document.getElementById('toggle-bar').classList.toggle('active', type === 'bar');
        document.getElementById('toggle-pie').classList.toggle('active', type === 'pie');
        if (currentUserAgentData.length > 0) renderUserAgentChart(currentUserAgentData, getThemeColors());
      }

      function updateWatermark(data) {
        const el = document.getElementById('watermark');
        if (!el || !data || data.length === 0) return;
        const latest = data[data.length - 1];
        const t = new Date(latest.since * 1000);
        const fmt = t.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        const hours = Math.round((latest.since - data[0].since) / 3600);
        el.innerHTML = `
          <div class="watermark-row">
            <span class="watermark-time">${fmt}</span>
            <button class="btn-icon" onclick="loadStats()" title="刷新" style="width:24px;height:24px;font-size:11px;border:none;background:transparent;color:var(--primary);cursor:pointer;"><i class="fas fa-sync-alt"></i></button>
          </div>
          <div class="watermark-info">数据覆盖 ${hours}h · ${data.length} 个数据点</div>
        `;
      }

      async function loadStats() {
        const bar = document.getElementById('progress-bar');
        const fill = document.getElementById('progress-fill');
        const loadingProgress = document.getElementById('loading-progress');
        const loadingPercent = document.getElementById('loading-percent');

        // 更新进度条
        function updateProgress(percent) {
          if (loadingProgress) {
            loadingProgress.style.height = percent + '%';
          }
          if (fill) {
            fill.style.width = percent + '%';
          }
          if (loadingPercent) {
            loadingPercent.textContent = percent + '%';
          }
        }

        try {
          if (bar) bar.style.display = 'block';
          if (loadingProgress) loadingProgress.classList.add('active');
          updateProgress(10);

          document.querySelectorAll('.kpi-value').forEach(el => el.innerHTML = '<div class="loading-spinner"></div>');
          document.querySelectorAll('.chart-container').forEach(el => el.innerHTML = '<div class="loading-spinner"></div>');

          updateProgress(30);
          const resp = await fetch('cloudflare_hourly_stats.json');
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          updateProgress(60);

          const data = await resp.json();
          if (!Array.isArray(data) || data.length === 0) throw new Error('数据为空');
          updateProgress(80);

          window.chartData = data;
          createKPIs(data);
          updateProgress(90);

          createCharts(data);
          updateProgress(95);

          updateWatermark(data);
          updateProgress(100);

          // 加载完成，隐藏进度条
          setTimeout(() => {
            if (bar) bar.style.display = 'none';
            if (loadingProgress) {
              loadingProgress.classList.remove('active');
              loadingProgress.classList.add('complete');
              loadingProgress.style.display = 'none';
            }
          }, 400);
        } catch (e) {
          if (bar) bar.style.display = 'none';
          if (loadingProgress) {
            loadingProgress.classList.remove('active');
            loadingProgress.classList.add('complete');
            loadingProgress.style.display = 'none';
          }
          document.getElementById('kpi-requests').textContent = '-';
          console.error('加载失败:', e);
        }
      }

      // 卡片边框光晕跟随鼠标效果
      function initCardGlowEffect() {
        const cards = document.querySelectorAll('.kpi-card, .chart-card');
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
          (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);

        cards.forEach(card => {
          card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 根据主题选择光晕颜色
            const glowColor = isDark ? 'rgba(255, 215, 0,' : 'rgba(184, 134, 11,';
            const borderColor = isDark ? 'rgba(255, 215, 0, 0.6)' : 'rgba(184, 134, 11, 0.5)';

            // 使用 box-shadow 实现边框光晕，避免 border 宽度变化
            card.style.boxShadow = `
              0 0 20px ${glowColor}0.3),
              inset 0 0 15px ${glowColor}0.05)
            `;
            card.style.borderColor = borderColor;
          });

          card.addEventListener('mouseleave', () => {
            card.style.boxShadow = '';
            card.style.borderColor = '';
          });
        });
      }

      window.onload = function () {
        initTheme();
        loadStats();
        populateBotTable();
        document.getElementById('toggle-bar').addEventListener('click', () => toggleChartType('bar'));
        document.getElementById('toggle-pie').addEventListener('click', () => toggleChartType('pie'));

        // 延迟初始化高光效果，等待卡片渲染完成
        setTimeout(initCardGlowEffect, 1000);
      };
    </script>
  </head>
  <body>
    <div id="loading-progress" class="loading-progress">
      <span id="loading-percent" class="loading-percent">0%</span>
    </div>
    <div id="progress-bar" class="progress-bar"><div id="progress-fill" class="progress-bar-fill"></div></div>

    <header class="header">
      <div class="header-title"><i class="fas fa-shield-alt"></i> CLOUDFLARE ANALYTICS</div>
      <div class="header-actions">
        <button id="theme-toggle" class="btn-icon" onclick="toggleTheme()" title="切换主题"><i class="fas fa-moon"></i></button>
      </div>
    </header>

    <div class="container">
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label"><i class="fas fa-globe"></i> 总请求数</div>
          <div class="kpi-value" id="kpi-requests">-</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><i class="fas fa-exchange-alt"></i> 总流量</div>
          <div class="kpi-value" id="kpi-traffic">-</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><i class="fas fa-shield-alt"></i> WAF 拦截数</div>
          <div class="kpi-value" id="kpi-waf">-</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><i class="fas fa-percentage"></i> 平均拦截率</div>
          <div class="kpi-value" id="kpi-rate">-</div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-header"><span class="chart-title">请求量与 WAF 拦截趋势</span></div>
          <div class="chart-container" id="requestsWafChart"></div>
        </div>
        <div class="chart-card">
          <div class="chart-header"><span class="chart-title">流量变化趋势</span></div>
          <div class="chart-container" id="trafficChart"></div>
        </div>
        <div class="chart-card">
          <div class="chart-header">
            <span class="chart-title">浏览器使用排行</span>
            <div class="chart-toggle">
              <button id="toggle-bar" class="chart-toggle-btn active"><i class="fas fa-chart-bar"></i></button>
              <button id="toggle-pie" class="chart-toggle-btn"><i class="fas fa-chart-pie"></i></button>
            </div>
          </div>
          <div class="chart-container" id="userAgentChart"></div>
        </div>
        <div class="chart-card">
          <div class="chart-header"><span class="chart-title">国家/地区分布</span></div>
          <div class="chart-container" id="countryChart"></div>
        </div>
        <div class="chart-card" style="grid-column: 1 / -1;">
          <div class="chart-header"><span class="chart-title">Bot 访问分析（最近7天）</span></div>
          <div style="overflow: auto; max-height: 320px;">
            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
              <thead style="position: sticky; top: 0; background: var(--bg-card); z-index: 1;">
                <tr style="border-bottom: 2px solid var(--border); text-align: left;">
                  <th style="padding: 12px 8px; font-weight: 600;">爬虫名称</th>
                  <th style="padding: 12px 8px; font-weight: 600;">运营商</th>
                  <th style="padding: 12px 8px; font-weight: 600;">类别</th>
                  <th style="padding: 12px 8px; font-weight: 600;">User-Agent</th>
                  <th style="padding: 12px 8px; font-weight: 600;">占比</th>
                </tr>
              </thead>
              <tbody id="bot-table-body">
                <tr><td colspan="5" style="text-align: center; padding: 20px; color: var(--text-secondary);">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div id="watermark" class="watermark">
      <div class="watermark-row"><span class="watermark-time">加载中...</span></div>
      <div class="watermark-info">正在获取数据...</div>
    </div>

    <footer class="footer">
      © <span id="current-year"></span> Powered by <a href="https://github.com/ymh0000123/Cloudflare-Showcase">Cloudflare-Showcase</a>
    </footer>

    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
  </body>
</html>
